<svg viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" width="1200" height="1200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF6EE"/>
      <stop offset="100%" style="stop-color:#F0DFC8"/>
    </linearGradient>
    <linearGradient id="fadeTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C4956A;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#C4956A;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bgGrad)"/>

  <!-- Top fade -->
  <rect width="1200" height="300" fill="url(#fadeTop)"/>

  <!-- Dot pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#C4956A" opacity="0.15"/>
  </pattern>
  <rect width="1200" height="1200" fill="url(#dots)"/>

  <!-- Elegant full border -->
  <rect x="60" y="60" width="1080" height="1080" fill="none" stroke="#C4956A" stroke-width="1.5" opacity="0.4"/>
  <rect x="72" y="72" width="1056" height="1056" fill="none" stroke="#C4956A" stroke-width="0.5" opacity="0.2"/>

  <!-- Corner flourishes -->
  <!-- TL -->
  <path d="M60,120 Q60,60 120,60" fill="none" stroke="#C4956A" stroke-width="2" opacity="0.5"/>
  <path d="M60,150 Q60,60 150,60" fill="none" stroke="#C4956A" stroke-width="0.8" opacity="0.3"/>
  <!-- TR -->
  <path d="M1140,120 Q1140,60 1080,60" fill="none" stroke="#C4956A" stroke-width="2" opacity="0.5"/>
  <path d="M1140,150 Q1140,60 1050,60" fill="none" stroke="#C4956A" stroke-width="0.8" opacity="0.3"/>
  <!-- BL -->
  <path d="M60,1080 Q60,1140 120,1140" fill="none" stroke="#C4956A" stroke-width="2" opacity="0.5"/>
  <path d="M60,1050 Q60,1140 150,1140" fill="none" stroke="#C4956A" stroke-width="0.8" opacity="0.3"/>
  <!-- BR -->
  <path d="M1140,1080 Q1140,1140 1080,1140" fill="none" stroke="#C4956A" stroke-width="2" opacity="0.5"/>
  <path d="M1140,1050 Q1140,1140 1050,1140" fill="none" stroke="#C4956A" stroke-width="0.8" opacity="0.3"/>

  <!-- Section label -->
  <text x="600" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#C4956A" letter-spacing="7">CARTA FINAL</text>
  <line x1="300" y1="160" x2="510" y2="160" stroke="#C4956A" stroke-width="0.8" opacity="0.35"/>
  <circle cx="600" cy="162" r="3" fill="#C4956A" opacity="0.4"/>
  <line x1="690" y1="160" x2="900" y2="160" stroke="#C4956A" stroke-width="0.8" opacity="0.35"/>

  <!-- Title -->
  <text x="600" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="64" fill="#6B4226" font-style="italic" font-weight="300">Para você,</text>

  <!-- Photo area - centered, portrait -->
  <rect x="420" y="300" width="360" height="280" rx="4" fill="#E8D5C0" opacity="0.35"/>
  <rect x="420" y="300" width="360" height="280" rx="4" fill="none" stroke="#C4956A" stroke-width="1" stroke-dasharray="7,5" opacity="0.45"/>
  <text x="600" y="435" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#9B6B47" opacity="0.5" font-style="italic">foto favorita</text>
  <text x="600" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#9B6B47" opacity="0.35">dos dois juntos</text>

  <!-- Divider ornament -->
  <line x1="300" y1="630" x2="540" y2="630" stroke="#C4956A" stroke-width="0.8" opacity="0.35"/>
  <text x="600" y="637" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#C4956A" opacity="0.5">✦</text>
  <line x1="660" y1="630" x2="900" y2="630" stroke="#C4956A" stroke-width="0.8" opacity="0.35"/>

  <!-- Letter lines - generous spacing, like actual letter paper -->
  <line x1="160" y1="700" x2="1040" y2="700" stroke="#C4956A" stroke-width="0.6" opacity="0.25"/>
  <line x1="160" y1="755" x2="1040" y2="755" stroke="#C4956A" stroke-width="0.6" opacity="0.25"/>
  <line x1="160" y1="810" x2="1040" y2="810" stroke="#C4956A" stroke-width="0.6" opacity="0.25"/>
  <line x1="160" y1="865" x2="1040" y2="865" stroke="#C4956A" stroke-width="0.6" opacity="0.25"/>
  <line x1="160" y1="920" x2="1040" y2="920" stroke="#C4956A" stroke-width="0.6" opacity="0.25"/>
  <line x1="160" y1="975" x2="1040" y2="975" stroke="#C4956A" stroke-width="0.6" opacity="0.25"/>
  <line x1="160" y1="1030" x2="1040" y2="1030" stroke="#C4956A" stroke-width="0.6" opacity="0.25"/>

  <!-- Hint text -->
  <text x="180" y="688" font-family="Georgia, serif" font-size="20" fill="#6B4226" font-style="italic" opacity="0.25">escreva sua carta aqui, de coração...</text>

  <!-- Signature area hint -->
  <text x="700" y="1095" font-family="Georgia, serif" font-size="19" fill="#9B6B47" font-style="italic" opacity="0.4">com amor,</text>
  <line x1="700" y1="1115" x2="1020" y2="1115" stroke="#C4956A" stroke-width="0.8" opacity="0.3"/>
  <text x="700" y="1130" font-family="Georgia, serif" font-size="14" fill="#9B6B47" opacity="0.3" font-style="italic">seu nome aqui</text>
</svg>
