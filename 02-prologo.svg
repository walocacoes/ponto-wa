<svg viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" width="1200" height="1200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF6EE"/>
      <stop offset="100%" style="stop-color:#F5E8D8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bgGrad)"/>

  <!-- Dot pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#C4956A" opacity="0.15"/>
  </pattern>
  <rect width="1200" height="1200" fill="url(#dots)"/>

  <!-- Left accent bar -->
  <rect x="80" y="80" width="4" height="1040" rx="2" fill="#C4956A" opacity="0.4"/>
  <rect x="90" y="80" width="1" height="1040" fill="#C4956A" opacity="0.15"/>

  <!-- Top section tag -->
  <text x="130" y="130" font-family="Arial, sans-serif" font-size="13" fill="#C4956A" letter-spacing="5" font-weight="300">PRÓLOGO</text>
  <line x1="130" y1="145" x2="430" y2="145" stroke="#C4956A" stroke-width="0.8" opacity="0.5"/>

  <!-- Date label -->
  <text x="130" y="200" font-family="Georgia, serif" font-size="15" fill="#9B6B47" opacity="0.7" font-style="italic">novembro de 2024</text>

  <!-- Main title -->
  <text x="130" y="290" font-family="Georgia, serif" font-size="62" fill="#6B4226" font-style="italic" font-weight="300">Antes de tudo,</text>
  <text x="130" y="365" font-family="Georgia, serif" font-size="62" fill="#6B4226" font-style="italic" font-weight="300">tinha você.</text>

  <!-- Decorative element -->
  <line x1="130" y1="400" x2="300" y2="400" stroke="#C4956A" stroke-width="1" opacity="0.5"/>

  <!-- Photo area - smaller, elegant, offset -->
  <rect x="680" y="200" width="420" height="520" rx="3" fill="#E8D5C0" opacity="0.35"/>
  <rect x="680" y="200" width="420" height="520" rx="3" fill="none" stroke="#C4956A" stroke-width="1" stroke-dasharray="6,5" opacity="0.45"/>
  <text x="890" y="450" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#9B6B47" opacity="0.5" font-style="italic">foto</text>
  <text x="890" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#9B6B47" opacity="0.35">desse período</text>

  <!-- Text lines placeholder -->
  <text x="130" y="480" font-family="Georgia, serif" font-size="22" fill="#6B4226" font-style="italic" font-weight="300">escreva aqui sobre como vocês se conheceram.</text>

  <line x1="130" y1="530" x2="580" y2="530" stroke="#C4956A" stroke-width="0.5" opacity="0.3"/>
  <line x1="130" y1="580" x2="580" y2="580" stroke="#C4956A" stroke-width="0.5" opacity="0.3"/>
  <line x1="130" y1="630" x2="580" y2="630" stroke="#C4956A" stroke-width="0.5" opacity="0.3"/>
  <line x1="130" y1="680" x2="580" y2="680" stroke="#C4956A" stroke-width="0.5" opacity="0.3"/>
  <line x1="130" y1="730" x2="580" y2="730" stroke="#C4956A" stroke-width="0.5" opacity="0.3"/>

  <!-- Second photo area horizontal -->
  <rect x="130" y="800" width="460" height="300" rx="3" fill="#E8D5C0" opacity="0.35"/>
  <rect x="130" y="800" width="460" height="300" rx="3" fill="none" stroke="#C4956A" stroke-width="1" stroke-dasharray="6,5" opacity="0.45"/>
  <text x="360" y="940" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#9B6B47" opacity="0.5" font-style="italic">foto opcional</text>

  <!-- Right bottom text area -->
  <line x1="660" y1="820" x2="1100" y2="820" stroke="#C4956A" stroke-width="0.5" opacity="0.3"/>
  <line x1="660" y1="870" x2="1100" y2="870" stroke="#C4956A" stroke-width="0.5" opacity="0.3"/>
  <line x1="660" y1="920" x2="1100" y2="920" stroke="#C4956A" stroke-width="0.5" opacity="0.3"/>
  <line x1="660" y1="970" x2="1100" y2="970" stroke="#C4956A" stroke-width="0.5" opacity="0.3"/>
  <line x1="660" y1="1020" x2="1100" y2="1020" stroke="#C4956A" stroke-width="0.5" opacity="0.3"/>

  <!-- Page number -->
  <text x="600" y="1150" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#C4956A" opacity="0.5" letter-spacing="3">◇</text>

  <!-- Bottom border -->
  <rect x="80" y="1100" width="1040" height="1" fill="#C4956A" opacity="0.2"/>
</svg>
