<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Lançamento Retroativo — WA</title>
<style>
  body { font-family: Inter, sans-serif; background: #141414; color: #F5F5F5; padding: 32px; max-width: 700px; margin: 0 auto; }
  h1 { color: #E8302F; margin-bottom: 4px; }
  p { color: #A0A0A0; margin-bottom: 24px; font-size: 14px; }
  #log { background: #1E1E1E; border: 1px solid #3A3A3A; border-radius: 8px; padding: 16px; height: 400px; overflow-y: auto; font-size: 12px; font-family: monospace; }
  .ok { color: #22C55E; } .err { color: #E8302F; } .info { color: #A0A0A0; }
  button { background: #C41E20; color: #fff; border: none; padding: 14px 28px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 20px; }
  button:disabled { background: #3A3A3A; color: #666; cursor: not-allowed; }
  #resumo { margin-top: 16px; font-size: 14px; color: #A0A0A0; }
</style>
</head>
<body>
<h1>Lançamento Retroativo</h1>
<p>Lança os registros de 01/06 a 17/06/2026 para todos os funcionários.<br>Feriados (04/06 e 15/06) e domingos serão ignorados automaticamente.</p>
<button id="btn" onclick="iniciar()">Iniciar Lançamento</button>
<div id="log"></div>
<div id="resumo"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCaIDSapH5BVAEKFvK352ktJUT4wrmbvxQ",
  authDomain: "ponto-wa.firebaseapp.com",
  projectId: "ponto-wa",
  storageBucket: "ponto-wa.firebasestorage.app",
  messagingSenderId: "557019570825",
  appId: "1:557019570825:web:4fa5fa4456b0c10aa65c58"
});
const db = getFirestore(app);

const FERIADOS = new Set(['2026-06-04','2026-06-15']);
const MOTIVO = 'Lançamento retroativo — período anterior ao início do sistema (01/06 a 17/06/2026)';

const HORARIOS = {
  'F01': { seg_sex: ['08:00','12:00','14:00','18:00'], sab: ['08:00','12:00'] }, // Jizany
  'F02': { seg_sex: ['08:00','11:00','13:00','18:00'], sab: ['08:00','12:00'] }, // Emanuella
  'F04': { seg_sex: ['08:00','13:00','15:00','18:00'], sab: ['08:00','12:00'] }, // Adrielly
  'F03': { seg_sex: ['08:00','11:30','13:30','18:00'], sab: ['08:00','12:00'] }, // Alessandro
};

function pad(n){ return String(n).padStart(2,'0'); }

function getDates(){
  const dates = [];
  const d = new Date(2026,5,1); // jun 2026
  const end = new Date(2026,5,17);
  while(d <= end){
    const ds = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const w = d.getDay(); // 0=dom
    if(!FERIADOS.has(ds) && w !== 0){
      dates.push({ ds, w });
    }
    d.setDate(d.getDate()+1);
  }
  return dates;
}

function log(msg, cls='info'){
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

window.iniciar = async function(){
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Lançando...';
  document.getElementById('log').innerHTML = '';

  const dates = getDates();
  log(`📅 ${dates.length} dias úteis encontrados (01/06 a 17/06, sem feriados)`);
  log(`👥 4 funcionários × ${dates.length} dias = ${dates.length*4} registros`);
  log('---');

  let ok = 0, erros = 0;

  for(const {ds, w} of dates){
    for(const [empId, h] of Object.entries(HORARIOS)){
      const docId = `${empId}_${ds}`;
      let rec = {
        _editado: true,
        _editado_por: 'Gestão',
        _editado_em: '27/06/2026 00:00',
        _motivo: MOTIVO
      };

      if(w === 6){ // sábado
        rec.entrada = h.sab[0];
        rec.saida   = h.sab[1];
      } else {
        rec.entrada          = h.seg_sex[0];
        rec.saida_almoco     = h.seg_sex[1];
        rec.retorno_almoco   = h.seg_sex[2];
        rec.saida            = h.seg_sex[3];
      }

      try {
        await setDoc(doc(db,'ponto',docId), rec);
        log(`✓ ${docId}`, 'ok');
        ok++;
      } catch(e) {
        log(`✗ ${docId} — ${e.message}`, 'err');
        erros++;
      }
    }
  }

  log('---');
  log(`✅ Concluído: ${ok} lançados, ${erros} erros`, ok>0?'ok':'err');
  document.getElementById('resumo').textContent = `${ok} registros lançados com sucesso.`;
  btn.textContent = 'Concluído';
};
</script>
</body>
</html>
