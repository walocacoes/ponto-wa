<svg viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" width="1200" height="1200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF6EE"/>
      <stop offset="100%" style="stop-color:#F5E8D8"/>
    </linearGradient>
    <linearGradient id="numGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4956A;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#C4956A;stop-opacity:0.04"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bgGrad)"/>

  <!-- Dot pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#C4956A" opacity="0.15"/>
  </pattern>
  <rect width="1200" height="1200" fill="url(#dots)"/>

  <!-- Large ghost month number -->
  <text x="600" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="420" fill="url(#numGrad)" font-style="italic">1</text>

  <!-- Top border line -->
  <rect x="80" y="80" width="1040" height="3" rx="1.5" fill="#C4956A" opacity="0.35"/>

  <!-- Month label -->
  <text x="100" y="150" font-family="Arial, sans-serif" font-size="12" fill="#C4956A" letter-spacing="6" font-weight="300">MÊS</text>

  <!-- Month name / date -->
  <text x="100" y="215" font-family="Georgia, serif" font-size="52" fill="#6B4226" font-style="italic" font-weight="300">Abril — Maio</text>
  <text x="100" y="265" font-family="Arial, sans-serif" font-size="15" fill="#9B6B47" letter-spacing="3" opacity="0.7">2025</text>

  <!-- Tag / tema do mês -->
  <rect x="100" y="300" width="280" height="38" rx="19" fill="#C4956A" opacity="0.15"/>
  <text x="240" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6B4226" letter-spacing="2">O COMEÇO DE TUDO</text>

  <!-- Main photo area - large -->
  <rect x="100" y="380" width="580" height="440" rx="4" fill="#E8D5C0" opacity="0.35"/>
  <rect x="100" y="380" width="580" height="440" rx="4" fill="none" stroke="#C4956A" stroke-width="1" stroke-dasharray="7,5" opacity="0.45"/>
  <text x="390" y="585" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#9B6B47" opacity="0.5" font-style="italic">foto principal do mês</text>
  <text x="390" y="615" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#9B6B47" opacity="0.35">a favorita ou a mais marcante</text>

  <!-- Small photo 2 -->
  <rect x="720" y="380" width="380" height="200" rx="3" fill="#E8D5C0" opacity="0.3"/>
  <rect x="720" y="380" width="380" height="200" rx="3" fill="none" stroke="#C4956A" stroke-width="1" stroke-dasharray="6,5" opacity="0.4"/>
  <text x="910" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#9B6B47" opacity="0.45" font-style="italic">foto opcional</text>

  <!-- Small photo 3 -->
  <rect x="720" y="610" width="380" height="210" rx="3" fill="#E8D5C0" opacity="0.3"/>
  <rect x="720" y="610" width="380" height="210" rx="3" fill="none" stroke="#C4956A" stroke-width="1" stroke-dasharray="6,5" opacity="0.4"/>
  <text x="910" y="716" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#9B6B47" opacity="0.45" font-style="italic">foto opcional</text>

  <!-- Divider -->
  <line x1="100" y1="870" x2="1100" y2="870" stroke="#C4956A" stroke-width="0.8" opacity="0.3"/>

  <!-- Text / caption area -->
  <text x="100" y="930" font-family="Georgia, serif" font-size="20" fill="#6B4226" font-style="italic" opacity="0.4">escreva algo sobre esse mês...</text>

  <line x1="100" y1="975" x2="1100" y2="975" stroke="#C4956A" stroke-width="0.5" opacity="0.25"/>
  <line x1="100" y1="1025" x2="1100" y2="1025" stroke="#C4956A" stroke-width="0.5" opacity="0.25"/>
  <line x1="100" y1="1075" x2="1100" y2="1075" stroke="#C4956A" stroke-width="0.5" opacity="0.25"/>

  <!-- Bottom border + page number -->
  <rect x="80" y="1130" width="1040" height="1.5" rx="0.75" fill="#C4956A" opacity="0.25"/>
  <text x="600" y="1165" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#C4956A" opacity="0.4" letter-spacing="3">◇</text>
</svg>
