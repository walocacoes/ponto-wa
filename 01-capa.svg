<svg viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" width="1200" height="1200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&amp;family=Jost:wght@200;300;400&amp;display=swap');
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF6EE"/>
      <stop offset="100%" style="stop-color:#F5E8D8"/>
    </linearGradient>
    <linearGradient id="cornerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4956A;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#9B6B47;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bgGrad)"/>

  <!-- Subtle texture dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#C4956A" opacity="0.2"/>
  </pattern>
  <rect width="1200" height="1200" fill="url(#dots)"/>

  <!-- Outer border frame -->
  <rect x="40" y="40" width="1120" height="1120" fill="none" stroke="#C4956A" stroke-width="1.5" opacity="0.5"/>
  <rect x="55" y="55" width="1090" height="1090" fill="none" stroke="#C4956A" stroke-width="0.5" opacity="0.3"/>

  <!-- Corner ornaments - top left -->
  <g opacity="0.7">
    <line x1="40" y1="40" x2="160" y2="40" stroke="#C4956A" stroke-width="2"/>
    <line x1="40" y1="40" x2="40" y2="160" stroke="#C4956A" stroke-width="2"/>
    <circle cx="40" cy="40" r="5" fill="#C4956A"/>
    <line x1="80" y1="40" x2="80" y2="80" stroke="#C4956A" stroke-width="0.8" opacity="0.5"/>
    <line x1="40" y1="80" x2="80" y2="80" stroke="#C4956A" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Corner ornaments - top right -->
  <g opacity="0.7">
    <line x1="1160" y1="40" x2="1040" y2="40" stroke="#C4956A" stroke-width="2"/>
    <line x1="1160" y1="40" x2="1160" y2="160" stroke="#C4956A" stroke-width="2"/>
    <circle cx="1160" cy="40" r="5" fill="#C4956A"/>
    <line x1="1120" y1="40" x2="1120" y2="80" stroke="#C4956A" stroke-width="0.8" opacity="0.5"/>
    <line x1="1160" y1="80" x2="1120" y2="80" stroke="#C4956A" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Corner ornaments - bottom left -->
  <g opacity="0.7">
    <line x1="40" y1="1160" x2="160" y2="1160" stroke="#C4956A" stroke-width="2"/>
    <line x1="40" y1="1160" x2="40" y2="1040" stroke="#C4956A" stroke-width="2"/>
    <circle cx="40" cy="1160" r="5" fill="#C4956A"/>
    <line x1="80" y1="1160" x2="80" y2="1120" stroke="#C4956A" stroke-width="0.8" opacity="0.5"/>
    <line x1="40" y1="1120" x2="80" y2="1120" stroke="#C4956A" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Corner ornaments - bottom right -->
  <g opacity="0.7">
    <line x1="1160" y1="1160" x2="1040" y2="1160" stroke="#C4956A" stroke-width="2"/>
    <line x1="1160" y1="1160" x2="1160" y2="1040" stroke="#C4956A" stroke-width="2"/>
    <circle cx="1160" cy="1160" r="5" fill="#C4956A"/>
    <line x1="1120" y1="1160" x2="1120" y2="1120" stroke="#C4956A" stroke-width="0.8" opacity="0.5"/>
    <line x1="1160" y1="1120" x2="1120" y2="1120" stroke="#C4956A" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Photo area placeholder -->
  <rect x="250" y="160" width="700" height="560" rx="4" fill="#E8D5C0" opacity="0.4"/>
  <rect x="250" y="160" width="700" height="560" rx="4" fill="none" stroke="#C4956A" stroke-width="1" stroke-dasharray="8,6" opacity="0.5"/>
  <text x="600" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#9B6B47" opacity="0.5" font-style="italic">sua foto aqui</text>
  <text x="600" y="465" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#9B6B47" opacity="0.4">recomendado: foto favorita dos dois</text>

  <!-- Divider line -->
  <line x1="380" y1="770" x2="820" y2="770" stroke="#C4956A" stroke-width="0.8" opacity="0.6"/>
  <circle cx="600" cy="770" r="3" fill="#C4956A" opacity="0.6"/>

  <!-- Title area -->
  <text x="600" y="850" text-anchor="middle" font-family="Georgia, serif" font-size="58" fill="#6B4226" font-weight="300" font-style="italic">um ano sendo</text>
  <text x="600" y="930" text-anchor="middle" font-family="Georgia, serif" font-size="58" fill="#6B4226" font-weight="300" font-style="italic">a gente</text>

  <!-- Subtitle -->
  <text x="600" y="1005" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#9B6B47" letter-spacing="6" font-weight="300">27 DE ABRIL DE 2025 — 2026</text>

  <!-- Bottom ornament -->
  <g opacity="0.5">
    <line x1="540" y1="1060" x2="570" y2="1060" stroke="#C4956A" stroke-width="1"/>
    <circle cx="600" cy="1060" r="4" fill="none" stroke="#C4956A" stroke-width="1"/>
    <line x1="630" y1="1060" x2="660" y2="1060" stroke="#C4956A" stroke-width="1"/>
  </g>
</svg>
